version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sync_user
      POSTGRES_PASSWORD: sync_password
      POSTGRES_DB: sync_db
    ports:
      - "5497:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sync_user -d sync_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    restart: always
    ports:
      - "8397:8080"
    depends_on:
      db:
        condition: service_healthy

  sync-server:
    build: .
    ports:
      - "3397:3001"
    environment:
      - DATABASE_URL=postgres://sync_user:sync_password@db:5432/sync_db
      - PORT=3001
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
